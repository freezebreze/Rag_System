version: "3.8"

services:
  # ── Milvus 依赖：etcd ──────────────────────────────────────────────────────
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./volumes/etcd:/etcd
    command: >
      etcd
      -advertise-client-urls=http://milvus-etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kb-net

  # ── Milvus 依赖：MinIO ─────────────────────────────────────────────────────
  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: milvus-minio
    env_file:
      - backend/.env
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9005:9000"
      - "9001:9001"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kb-net

  # ── Milvus Standalone ─────────────────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.6.13
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_REGION: us-east-1
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - kb-net

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: kb-postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_db}
      POSTGRES_USER: ${POSTGRES_USER:-kbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kbpass}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-net
  # ── Milvus GUI: Attu ──────────────────────────────────────────────────────
  attu:
    image: zilliz/attu:latest
    container_name: milvus-attu
    ports:
      - "8080:3000"
    environment:
      # 注意：这里的 HOST 要填写 milvus 的 container_name
      - MILVUS_URL=milvus-standalone:19530 
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - kb-net
networks:
  kb-net:
    name: ai_agent_test_kb-net
    driver: bridge
