services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    extends:
      file: ./backend/docker-compose.yml
      service: api
    environment:
      - ENVIRONMENT=dev
      - TESTING=0

networks:
  kb-net:
    name: ai_agent_test_kb-net
    external: true
